<!DOCTYPE html>
<html>
  <head>
      <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
      <script src="https://kit.fontawesome.com/ce300b9666.js" crossorigin="anonymous"></script>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
      <meta charset="UTF-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta name="viewport" content="width=, initial-scale=1.0">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=PT+Mono&family=Pacifico&family=Shadows+Into+Light&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="src/styles.css">
      <title>Document</title>
  </head>

  <body>
      <div class="container">
        
    <h1>Weather Forecast 🌡️</h1>

      </br>
      <form id="search-form"> 
      <input id="city-input" type="text" class="form-control" placeholder="Enter a city name" autocomplete="on">
      <input type="submit" value="Search" class="form-control" /></br>
      <button class="btn btn-success" id="currentLocation1">
          Current
        </button>
      </form>
    </br>

      <h2 id="today2">Today in Berlin </h2>
    </br>
      <p>
          <span id ="temperature" class="today-temperature">19</span>
      <span class="units"> <a href="#" id="celsius">°C</a> |<a href="#" id="fahrenheit">°F</a></span> </>
      </br>
      <div class="todayDescription">Slight Rain <img
        class="weather-icon"
        src="http://openweathermap.org/img/wn/10d@2x.png"
        alt="weather icon"
         /></div>
      </br>
            <div class="col paremeters">
              <div class="col" id="humidity">
                Humidity: <span id="humidity_number">52</span>%
              </div>
              <div class="row windspeed">
                <div class="col" id="windspeed">
                  Windspeed:
                  <span id="windspeed_number">23</span> m/s
                </div>
              </div>

      
        </br>
        <h3 class="date">Thursday 30/12/2021 22:30</h3>
      </br>
    </br>
  </br>
  <div class="row fivedaysahead">
      <div class="col">
        <span id="day1">Monday</span>
        <div class="row">
          <img
            class="icon1"
            src="http://openweathermap.org/img/wn/10d@2x.png"
            alt="weather icon"
          />
        </div>
        <div class="row highlow1">24°/13°</div>
      </div>

      <div class="col">
        <span id="day2">Tuesday</span>
        <div class="row">
          <img
            class="icon2"
            src="http://openweathermap.org/img/wn/10d@2x.png"
            alt="weather icon"
          />
        </div>
        <div class="row highlow2">24°/13°</div>
      </div>
      <div class="col">
        <span id="day3">Wednesday</span>
        <div class="row">
          <img
            class="icon3"
            src="http://openweathermap.org/img/wn/10d@2x.png"
            alt="weather icon"
          />
        </div>
        <div class="row highlow3">24°/13°</div>
      </div>
      <div class="col">
        <span id="day4">Thursday</span>
        <div class="row">
          <img
            class="icon4"
            src="http://openweathermap.org/img/wn/10d@2x.png"
            alt="weather icon"
          />
        </div>
        <div class="row highlow4">24°/13°</div>
      </div>
      <div class="col">
        <span id="day5">Friday</span>
        <div class="row">
          <img
            class="icon5"
            src="http://openweathermap.org/img/wn/10d@2x.png"
            alt="weather icon"
          />
        </div>
        <div class="row highlow5">24°/13°</div>
      </div>
    </div>
  </div>
</br>

</body>

</html>
